<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ Autocar Web Cockpit</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #00e5ff;
            --danger-color: #ff1744;
            --text-color: #ffffff;
        }

        /* 1️⃣ 화면에 스크롤바가 생기지 않도록 높이를 브라우저 화면(100vh)에 딱 맞춤 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 세로/가로 스크롤바 원천 방지 */
            transition: background-color 0.2s ease;
        }

        /* 비상 정지 점멸 효과 */
        body.emergency-active {
            background-color: #3b000a !important;
            animation: pulse-danger 1s infinite alternate;
        }

        @keyframes pulse-danger {
            0% { background-color: #121212; }
            100% { background-color: #4a000a; }
        }

        header {
            text-align: center;
            padding: 12px 0 6px 0;
            height: 50px;
        }

        header h1 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        /* 2️⃣ 좌우로 나누는 메인 플렉스 컨테이너 */
        .container {
            display: flex;
            flex-direction: row; /* 핵심: 왼쪽(비디오), 오른쪽(컨트롤러) 가로 정렬 */
            gap: 20px;
            padding: 0 20px 20px 20px;
            height: calc(100vh - 62px); /* 전체 화면 높이에서 헤더 높이만큼 차감 */
            width: 100%;
            max-width: 100vw;
        }

        /* 👈 왼쪽 구역: 카메라 비디오 패널 (와이드 비율로 공간 확장) */
        .left-section {
            flex: 1.6; /* 오른쪽 영역보다 더 크게 화면을 양보 */
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .video-panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 2px solid #333;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-feed {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 이미지 비율 왜곡을 없애면서 찌그러짐 방지 */
            background-color: #000;
        }

        /* 👉 오른쪽 구역: 계기판 및 컨트롤 영역 (세로 배치 및 밀집화) */
        .right-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            justify-content: space-between; /* 구성 요소를 위아래 빈틈없이 분배 */
        }

        .card {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid #333;
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            font-size: 1rem;
            color: #ddd;
        }

        /* 상태 디스플레이 Grid */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .status-item {
            background: #252525;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .status-item .label {
            font-size: 0.75rem;
            color: #888;
            display: block;
            margin-bottom: 2px;
        }

        .status-item .value {
            font-size: 1rem;
            font-weight: bold;
        }

        /* 버튼 컴포넌트 */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background-color: #2e2e2e;
            color: var(--text-color);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
        }

        .btn-danger {
            background-color: var(--danger-color);
            color: #fff;
        }

        .btn-active {
            box-shadow: 0 0 12px var(--accent-color);
            border: 2px solid var(--accent-color);
        }

        /* 비상 안내 바 */
        #emergency-banner {
            display: none;
            background-color: var(--danger-color);
            color: white;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 5px;
            animation: blink 0.8s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        /* 🕹️ 가상 조이스틱 터치패드 영역 (반응형 공간 차지) */
        .joystick-card {
            flex-grow: 1; /* 가용 세로 영역을 조이스틱 판넬이 채우도록 설정 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .joystick-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            margin: 5px auto;
            position: relative;
            border: 3px dashed #444;
            touch-action: none;
        }

        #joystickCanvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: pointer;
        }

        /* 브라우저 너비가 768px 이하로 작아졌을 때 세로 모드로 원복 (모바일 배려) */
        @media (max-width: 768px) {
            body {
                overflow: auto;
            }
            .container {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }
            .left-section, .right-section {
                flex: none;
                width: 100%;
            }
            .video-panel {
                aspect-ratio: 4 / 3;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>🏎️ Autocar Web Cockpit</h1>
    </header>

    <div class="container">
        <div class="left-section">
            <div class="video-panel">
                <img class="video-feed" src="/video_feed" alt="실시간 카메라 피드">
            </div>
        </div>

        <div class="right-section">
            
            <div id="emergency-banner">🚨 EMERGENCY - 장애물 감지 제동! 🚨</div>

            <div class="card">
                <h3>📊 실시간 텔레메트리</h3>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="label">운행 모드</span>
                        <span id="txt-mode" class="value" style="color:var(--accent-color)">MANUAL</span>
                    </div>
                    <div class="status-item">
                        <span class="label">실시간 조도</span>
                        <span id="txt-lux" class="value">1000.0 Lx</span>
                    </div>
                    <div class="status-item">
                        <span class="label">가까운 장애물</span>
                        <span id="txt-obstacle" class="value">안전</span>
                    </div>
                    <div class="status-item">
                        <span class="label">조향 상태</span>
                        <span id="txt-steer" class="value">0.00</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>⚙️ 주행 제어 명령</h3>
                <div class="btn-group" style="margin-bottom: 10px;">
                    <button class="btn btn-primary" onclick="sendAction('auto')">🤖 자율주행 (AUTO)</button>
                    <button class="btn" onclick="sendAction('manual')">🕹️ 수동모드 (MANUAL)</button>
                </div>
                <div class="btn-group">
                    <button class="btn btn-danger" onclick="sendAction('stop')">🛑 비상 정지</button>
                    <button class="btn" style="background-color: #ffd600; color: #000;" onclick="sendAction('horn')">📯 클락션</button>
                </div>
            </div>

            <div class="card joystick-card">
                <h3 style="text-align:center; width:100%; margin-bottom: 5px;">🕹️ 가상 조이스틱 패드</h3>
                <div class="joystick-container">
                    <canvas id="joystickCanvas" width="150" height="150"></canvas>
                </div>
                <div style="font-size:0.75rem; text-align:center; color:#777; margin-top:2px;">
                    마우스 드래그 혹은 터치로 조향 조작
                </div>
            </div>

        </div>
    </div>

    <script>
        // 비동기 컨트롤 요청 함수
        function sendAction(actionName) {
            fetch('/control/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: actionName })
            })
            .then(res => res.json())
            .then(data => {
                console.log("Action Result:", data);
            });
        }

        // 실시간 정보 업데이트 인터벌 (150ms 주기)
        setInterval(() => {
            fetch('/status')
            .then(res => res.json())
            .then(data => {
                // UI 텍스트 업데이트
                document.getElementById('txt-mode').innerText = data.drive_mode;
                document.getElementById('txt-lux').innerText = data.current_lux.toFixed(1) + " Lx";
                document.getElementById('txt-steer').innerText = data.js_steer.toFixed(2);
                
                const obst = data.nearest_obstacle;
                if(data.is_emergency) {
                    document.getElementById('txt-obstacle').innerText = obst + " mm";
                    document.getElementById('txt-obstacle').style.color = "var(--danger-color)";
                    document.getElementById('emergency-banner').style.display = "block";
                    document.body.classList.add('emergency-active');
                } else {
                    document.getElementById('txt-obstacle').innerText = (obst > 9000) ? "안전" : obst + " mm";
                    document.getElementById('txt-obstacle').style.color = "#fff";
                    document.getElementById('emergency-banner').style.display = "none";
                    document.body.classList.remove('emergency-active');
                }
            })
            .catch(err => console.error(err));
        }, 150);

        // ====================================================
        // 🕹️ HTML5 Canvas 기반의 조이스틱 컨트롤러 알고리즘
        // ====================================================
        const canvas = document.getElementById('joystickCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;
        const maxRadius = 50; // 원 지름축 축소에 부합되게 가용 한계 범위 조정 (기존 60 -> 50)
        
        let stickX = centerX;
        let stickY = centerY;
        let isDragging = false;

        function drawJoystick() {
            ctx.clearRect(0, 0, width, height);

            // 가이드라인 베이스 원
            ctx.beginPath();
            ctx.arc(centerX, centerY, maxRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#2a2a2a';
            ctx.fill();
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 아날로그 조작 스틱 (원형 핸들)
            ctx.beginPath();
            ctx.arc(stickX, stickY, 20, 0, Math.PI * 2);
            ctx.fillStyle = isDragging ? 'var(--accent-color)' : '#777';
            ctx.fill();
            ctx.shadowBlur = isDragging ? 15 : 0;
            ctx.shadowColor = 'var(--accent-color)';
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 0; // 그림자 초기화
        }

        // 터치 및 마우스 드래그 좌표 해석 핸들러
        function handleMove(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = clientX - rect.left;
            const mouseY = clientY - rect.top;

            const dx = mouseX - centerX;
            const dy = mouseY - centerY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < maxRadius) {
                stickX = mouseX;
                stickY = mouseY;
            } else {
                const angle = Math.atan2(dy, dx);
                stickX = centerX + Math.cos(angle) * maxRadius;
                stickY = centerY + Math.sin(angle) * maxRadius;
            }

            drawJoystick();

            // 계산된 스틱의 도달 비율 추출 (-1.0 ~ 1.0)
            const steer = (stickX - centerX) / maxRadius;
            const throttle = -(stickY - centerY) / maxRadius; 

            sendJoystickData(steer, throttle);
        }

        function handleRelease() {
            isDragging = false;
            stickX = centerX;
            stickY = centerY;
            drawJoystick();
            sendJoystickData(0.0, 0.0);
        }

        // 서버 전송 디바운싱 (조이스틱 반응성 개선 50ms 게이트 설정 유지)
        let lastSendTime = 0;
        function sendJoystickData(steer, throttle) {
            const now = Date.now();
            if (now - lastSendTime < 50 && (steer !== 0 || throttle !== 0)) {
                return; 
            }
            lastSendTime = now;

            fetch('/control/joystick', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ steer: steer, throttle: throttle })
            }).catch(e => console.error(e));
        }

        // --- 마우스 이벤트 리스너 등록 ---
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            handleMove(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) handleMove(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', handleRelease);

        // --- 모바일 터치 이벤트 리스너 등록 ---
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            handleMove(touch.clientX, touch.clientY);
        });
        canvas.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const touch = e.touches[0];
                handleMove(touch.clientX, touch.clientY);
            }
        });
        canvas.addEventListener('touchend', handleRelease);

        // 초기 드로잉 실행
        drawJoystick();
    </script>
</body>
</html>
